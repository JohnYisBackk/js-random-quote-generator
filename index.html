<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Quote Generator PRO | JohnY</title>
  </head>
  <body>
    <button id="themeToggle" class="theme-toggle">🌙</button>

    <main class="app">
      <section class="quote-card">
        <h1 class="title">Quote Generator PRO</h1>

        <div class="quote-container" id="quoteContainer">
          <div class="quote-mark">“</div>

          <p id="quoteText" class="quote-text">
            Click the button to generate a random quote.
          </p>

          <p id="quoteAuthor" class="quote-author">— Unknown</p>
        </div>

        <div class="buttons">
          <button id="newQuoteBtn" class="btn primary">New Quote</button>
          <button id="copyQuoteBtn" class="btn secondary">Copy Quote</button>
        </div>
      </section>
    </main>
  </body>
</html>
